<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Primera Web</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      padding: 60px 20px;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      margin: 0;
    }

    p {
      font-size: 1.2em;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      font-size: 1em;
      border-radius: 8px;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    footer {
      background: #020617;
      padding: 20px;
      text-align: center;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

  <header>
    <h1>Mi Web 🚀</h1>
    <p>Ya estoy en internet con GitHub Pages</p>
    <button class="btn" onclick="saludar()">Haz clic</button>
  </header>

  <div class="section">
    <h2>Sobre mí</h2>
    <p>Esta es mi primera página web hecha desde cero.</p>
  </div>

  <div class="section">
    <h2>Servicios</h2>
    <p>Pronto agregaré más contenido aquí.</p>
  </div>

  <footer>
    <p>© 2026 Mi Web</p>
  </footer>

  <script>
    function saludar() {
      alert("Hola! Bienvenido a mi web 😎");
    }
  </script>

</body>
</html>
