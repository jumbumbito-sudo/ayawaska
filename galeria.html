<!DOCTYPE html>

<title>Galería Completa - Ayawaska</title>

<!-- ICONOS (IMPORTANTE PARA GITHUB) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  @font-face {
    font-family: 'Brux';
    src: url('BRUX-Regular.otf') format('opentype');
  }

  body {
    margin: 0;
    font-family: 'Brux', Arial;
    background-color: black;
    color: white;
    text-align: center;
  }

  header {
    background: linear-gradient(to bottom, #111, black);
    padding: 40px 20px;
    border-bottom: 2px solid #333;
  }

  h1 { font-size: 2.5em; margin: 0; }

  .back-btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 25px;
    background: white;
    color: black;
    text-decoration: none;
    font-family: Arial, sans-serif;
    font-weight: bold;
    border-radius: 6px;
    transition: 0.3s;
  }

  .back-btn:hover { background: #ccc; }

  .download-btn {
    display: inline-block;
    margin-top: 10px;
    margin-left: 10px;
    padding: 10px 25px;
    background: #ffcc00;
    color: black;
    text-decoration: none;
    font-family: Arial, sans-serif;
    font-weight: bold;
    border-radius: 6px;
    transition: 0.3s;
  }

  .download-btn:hover {
    background: #ffaa00;
  }

  .grid-galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 15px;
    padding: 40px 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .grid-galeria img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    transition: 0.3s;
    border: 1px solid #333;
  }

  .grid-galeria img:hover {
    transform: scale(1.05);
    border-color: white;
    box-shadow: 0 5px 15px rgba(255,255,255,0.2);
    z-index: 10;
  }

  /* REDES SOCIALES */
  .social-section {
    padding: 50px 20px;
    border-top: 1px solid #333;
  }

  .social-section h2 {
    margin-bottom: 20px;
  }

  .social-links a {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin: 10px;
    padding: 12px 22px;
    background: white;
    color: black;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
    font-family: Arial, sans-serif;
  }

  .social-links a i {
    font-size: 18px;
  }

  .social-links a:hover {
    background: #ccc;
    transform: scale(1.05);
  }
</style>
</head>
